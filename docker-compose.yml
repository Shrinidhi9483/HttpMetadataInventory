# HTTP Metadata Inventory - Docker Compose Configuration
# 
# Usage:
#   docker-compose up        - Start all services
#   docker-compose up -d     - Start in detached mode
#   docker-compose down      - Stop all services
#   docker-compose logs -f   - Follow logs

services:
  # FastAPI Application Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: metadata-api
    ports:
      - "8000:8000"
    environment:
      # Application settings
      - APP_NAME=HTTP Metadata Inventory
      - APP_VERSION=1.0.0
      - DEBUG=false
      
      # MongoDB settings
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DATABASE=metadata_inventory
      - MONGODB_MAX_POOL_SIZE=10
      - MONGODB_MIN_POOL_SIZE=1
      
      # HTTP client settings
      - HTTP_TIMEOUT=30.0
      - HTTP_MAX_RETRIES=3
      
      # Worker settings
      - WORKER_POOL_SIZE=5
      
      # API settings
      - API_PREFIX=/api/v1
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - metadata-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('https://localhost:8000/health', timeout=5, verify=False)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # MongoDB Database Service
  mongodb:
    image: mongo:7.0
    container_name: metadata-mongodb
    ports:
      - "27017:27017"
    environment:
      # For production, uncomment and set proper credentials:
      # - MONGO_INITDB_ROOT_USERNAME=admin
      # - MONGO_INITDB_ROOT_PASSWORD=secure_password
      - MONGO_INITDB_DATABASE=metadata_inventory
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      # Optional: Initialize database with custom script
      # - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - metadata-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Resource limits for production
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

# Named volumes for data persistence
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

# Network configuration
networks:
  metadata-network:
    driver: bridge
